<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de Boletas</title>
    <meta name="theme-color" content="#0050B3" />
    <meta name="description" content="Generador de boletas listillas editables" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((err) => {
            console.error('ServiceWorker registration failed: ', err);
          });
        });

        // Cuando un SW nuevo toma el control (nueva versión desplegada),
        // recargamos una sola vez para que el usuario siempre vea la
        // última versión de la app en vez de quedar pegado en una vieja.
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
